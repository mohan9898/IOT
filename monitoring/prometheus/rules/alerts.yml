groups:
  - name: IoTManagerAlerts
    interval: 30s
    rules:
      # 服务可用性告警
      - alert: ServiceDown
        expr: up{job="iot-manager"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "IoT Manager 服务不可用"
          description: "IoT Manager 服务在过去 1 分钟内不可用"

      # 设备离线告警
      - alert: HighOfflineDevices
        expr: devices_offline / devices_total > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "超过 30% 的设备离线"
          description: "目前有 {{ $value }}% 的设备处于离线状态"

      # MQTT 断开告警
      - alert: MQTTDisconnected
        expr: mqtt_connection_status == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MQTT 连接断开"
          description: "MQTT 连接已断开超过 1 分钟"

      # HTTP 错误率告警
      - alert: HighHTTPErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "高 HTTP 错误率"
          description: "过去 5 分钟内 HTTP 错误率超过 10%"

      # 登录失败告警
      - alert: HighLoginFailureRate
        expr: rate(login_attempts_total{status="failed"}[10m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "登录失败率过高"
          description: "过去 10 分钟内有超过 5 次登录失败"

      # 高延迟告警
      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "请求延迟过高"
          description: "95% 的请求延迟超过 0.5 秒"
