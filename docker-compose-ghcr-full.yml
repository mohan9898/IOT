version: '3.8'

services:
  iot-manager:
    # 使用 GitHub Container Registry 的镜像
    image: ghcr.io/mohan9898/iot:latest
    container_name: iot-manager
    restart: unless-stopped
    ports:
      - "6116:6116"
    environment:
      # 请根据需要修改以下配置
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-this-in-production}
      - JWT_EXPIRES_HOURS=${JWT_EXPIRES_HOURS:-24}
      - MQTT_BROKER=${MQTT_BROKER:-d11aab19.ala.cn-hangzhou.emqxsl.cn}
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_PROTOCOL=${MQTT_PROTOCOL:-ssl}
      - MQTT_TLS_ENABLED=${MQTT_TLS_ENABLED:-true}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - DB_PATH=/data/iot.db
      - DB_BACKUP_ENABLE=${DB_BACKUP_ENABLE:-true}
      - DB_BACKUP_PATH=/data/backup
      - DB_BACKUP_HOURS=${DB_BACKUP_HOURS:-24}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    volumes:
      - iot-data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6116/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:latest
    container_name: iot-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: iot-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning

  alertmanager:
    image: prom/alertmanager:latest
    container_name: iot-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/data
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/data'

volumes:
  iot-data:
    name: iot-manager-data
  prometheus-data:
    name: iot-prometheus-data
  grafana-data:
    name: iot-grafana-data
  alertmanager-data:
    name: iot-alertmanager-data
