version: '3.8'
services:
  iot-manager:
    build: .
    container_name: iot-manager
    ports:
      - "6116:6116"
    volumes:
      - ./data:/root/data
    environment:
      - MQTT_BROKER=d11aab19.ala.cn-hangzhou.emqxsl.cn
      - MQTT_PORT=8883
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6116/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  data:
    driver: local
