
# IoT Manager - Core Docker Compose
version: '3.8'

services:
  iot-manager:
    # Use GitHub Container Registry image
    image: ghcr.io/mohan9898/iot:latest
    container_name: iot-manager
    restart: unless-stopped
    ports:
      - "6116:6116"
    environment:
      # Required - change this in production!
      - JWT_SECRET=${JWT_SECRET}
      # MQTT Configuration
      - MQTT_BROKER=${MQTT_BROKER:-d11aab19.ala.cn-hangzhou.emqxsl.cn}
      - MQTT_PORT=${MQTT_PORT:-8883}
      - MQTT_PROTOCOL=${MQTT_PROTOCOL:-ssl}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      # Database
      - DB_PATH=/app/data/iot.db
      - DB_BACKUP_ENABLE=${DB_BACKUP_ENABLE:-true}
      - DB_BACKUP_PATH=/app/data/backup
    volumes:
      - iot-data:/app/data

volumes:
  iot-data:
    name: iot-manager-data
